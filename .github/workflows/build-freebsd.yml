name: Build Aero desktop binaries (FreeBSD)

# Manual only — default desktop is aero-*-lite (no FreeBSD Swift CI required).
on:
  workflow_dispatch:

jobs:
  freebsd-swift:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: FreeBSD VM - compile Aero shell
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.3"
          usesh: true
          sync: rsync
          prepare: |
            export IGNORE_OSVERSION=yes
            export ASSUME_ALWAYS_YES=yes
            pkg update -f || true
            pkg install -y swift510 gtk4 gtk4-layer-shell pkgconf labwc gmake curl || \
              pkg install -y -f swift510 gtk4 gtk4-layer-shell pkgconf labwc gmake curl
            if [ -x /usr/local/swift510/bin/swiftc ]; then
              ln -sf /usr/local/swift510/bin/swiftc /usr/local/bin/swiftc
              ln -sf /usr/local/swift510/bin/swift /usr/local/bin/swift || true
            fi
            export PATH="/usr/local/swift510/bin:/usr/local/bin:${PATH}"
            command -v swiftc
            swiftc --version
          run: |
            set -e
            export IGNORE_OSVERSION=yes
            export PATH="/usr/local/swift510/bin:/usr/local/bin:/usr/bin:/bin:${PATH}"
            WORK="$(pwd)"
            chmod +x overlay/usr/local/sbin/aero-build-desktop
            mkdir -p /usr/local/share/aero/src /usr/local/bin /usr/local/sbin
            cp -f main.swift aero-*.swift /usr/local/share/aero/src/
            cp -f overlay/usr/local/sbin/aero-build-desktop /usr/local/sbin/
            /usr/local/sbin/aero-build-desktop
            mkdir -p "$WORK/out-bin"
            cp -f /usr/local/bin/aero-shell \
                  /usr/local/bin/aero-settings \
                  /usr/local/bin/aero-lock \
                  /usr/local/bin/aero-firstboot \
                  /usr/local/bin/aero-store \
                  /usr/local/bin/aero-update-ui \
                  "$WORK/out-bin/"
            ls -la "$WORK/out-bin"

      - name: Upload binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: aero-desktop-freebsd-amd64
          path: out-bin/

      - name: Publish binaries to release v1.0.1
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          cd out-bin
          tar -cJf ../aero-desktop-amd64.tar.xz aero-shell aero-settings aero-lock aero-firstboot aero-store aero-update-ui
          cd ..
          gh release upload v1.0.1 aero-desktop-amd64.tar.xz --repo ${{ github.repository }} --clobber || true
