name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve manifest
        id: manifest
        run: |
          TAG="${GITHUB_REF_NAME}"
          CANDIDATES=(
            "releases/${TAG}/aero-update-manifest.json"
            "aero-update-manifest.json"
          )
          for f in "${CANDIDATES[@]}"; do
            if [ -f "$f" ]; then
              echo "path=$f" >> "$GITHUB_OUTPUT"
              cp "$f" aero-update-manifest.json
              echo "Using manifest: $f"
              exit 0
            fi
          done
          echo "No aero-update-manifest.json found for $TAG" >&2
          exit 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Aero OS ${{ github.ref_name }}
          generate_release_notes: true
          files: aero-update-manifest.json
