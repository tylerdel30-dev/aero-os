---
# Aero OS partition module — alongside dual-boot for existing Windows or macOS volumes
# Uses FreeBSD gpart(8) and ntfs-3g detection on a Unix partition table

default_scheme: "alongside"

default_filesystem: "zfs"
fallback_filesystem: "ufs"

always_show_labels: true
draw_nested_partitions: false

efi_system_partition:
    mount: "/boot/efi"
    size: 512M
    label: "EFI System Partition"

supported_foreign_filesystems:
    - ntfs
    - apfs
    - hfsplus
    - exfat

alongside:
    enabled: true
    label: "Install alongside an existing system"
    description: >
        Safely shrink an existing Windows or macOS partition and install Aero OS
        in the recovered space. Personal files on the foreign system are preserved.
    minimum_free_space: 25G
    maximum_shrink_percent: 50
    resize_strategy: "shrink-from-end"
    detect_other_os: true
    preserve_foreign_boot_entries: true
    allow_manual_adjustment: true
    show_preview: true
    create_dual_boot_entry: true

    foreign_os_detection:
        ntfs_probe: "/usr/local/bin/ntfs-3g.probe"
        gpart_list: "/sbin/gpart show"
        boot0cfg: "/usr/sbin/boot0cfg"

    resize_tools:
        - gpart
        - gpart recover
        - gpart resize

partitions:
    - name: "Aero OS Root"
      mount: "/"
      filesystem: "zfs"
      pool: "aero"
      required: true
      minimum_size: 20G

    - name: "Aero OS Home"
      mount: "/home"
      filesystem: "zfs"
      dataset: "aero/home"
      required: false
      minimum_size: 10G

    - name: "Swap"
      mount: "none"
      filesystem: "swap"
      required: false
      size: 4G

bootloader:
    type: "FreeBSD"
    efi_fallback: true
    menu_timeout: 5
    entry_label: "Aero OS"
    dual_boot:
        detect_windows_bcd: true
        detect_apfs_container: true
        chainload_foreign_efi: true

limits:
    root_minimum: 20G
    home_minimum: 10G
    boot_minimum: 512M

notes: |
    The alongside option uses gpart(8) to resize GPT partitions on Unix-style tables.
    Always back up critical data before modifying disk layout.
