---
# Aero OS bsdinstall wizard — Unix foundation install sequence
# Mirrors a guided flow: welcome → locale → keyboard → partition → users → summary → execute

installer:
    name: "Aero OS Setup"
    branding: "Aero OS"
    foundation: "FreeBSD Unix"
    boot_environment: "ZFS or UFS"

sequence:
    - page: welcome
      title: "Welcome to Aero OS"
      subtitle: "A Unix desktop built on the FreeBSD foundation, in the same lineage as Darwin."
      show_release_notes: true
      show_support_link: true

    - page: locale
      title: "Region and Language"
      default_locale: "en_US.UTF-8"
      timezone: "America/New_York"
      clock_utc: true

    - page: keyboard
      title: "Keyboard Layout"
      default_keymap: "us"
      variant: ""
      model: "pc105"

    - page: partition
      title: "Storage"
      config: "/usr/local/etc/bsdinstall/aero/partition.conf"
      default_scheme: "alongside"
      allow_manual: true
      show_preview: true

    - page: users
      title: "Create Your Account"
      hostname: "aero"
      default_groups:
          - wheel
          - operator
          - video
          - audio
      enable_root_login: false
      enable_sudo_wheel: true

    - page: summary
      title: "Ready to Install"
      confirm_before_execute: true

    - page: execute
      title: "Installing Aero OS"
      steps:
          - partition
          - newfs
          - extract-base
          - extract-kernel
          - install-packages
          - configure-rc
          - configure-users
          - install-bootloader
          - finalize

    - page: finished
      title: "Installation Complete"
      reboot_prompt: true
      reboot_command: "shutdown -r now"

services:
    enable_on_boot:
        - dbus
        - pipewire
        - wireplumber
        - labwc
        - sshd

paths:
    shell_binary: "/usr/local/bin/aero-shell"
    theme_css: "/usr/local/share/aero/style.css"
    version_file: "/etc/aero-version"
    installer_wrapper: "/usr/local/sbin/aero-install"

updates:
    manager: "pkg"
    upgrade_command: "pkg upgrade -y"
    version_check: "/etc/aero-version"
