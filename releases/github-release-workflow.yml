name: Publish Aero OS Update + ISO

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.1)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [ -f "releases/${TAG}/aero-update-manifest.json" ]; then
            echo "manifest=releases/${TAG}/aero-update-manifest.json" >> "$GITHUB_OUTPUT"
          elif [ -f "aero-update-manifest.json" ]; then
            echo "manifest=aero-update-manifest.json" >> "$GITHUB_OUTPUT"
          else
            echo "Missing aero-update-manifest.json for ${TAG}" >&2
            exit 1
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Aero OS ${{ steps.ver.outputs.tag }}
          body: |
            ## Aero OS ${{ steps.ver.outputs.tag }}

            ### ISO download
            If this release includes an `.iso`, use [Rufus](https://rufus.ie) (GPT + UEFI, DD mode).

            Build + upload from Windows:
            ```powershell
            .\build_os.ps1
            .\publish_iso.ps1 -Tag ${{ steps.ver.outputs.tag }}
            ```

            ### In-OS update (no reinstall)
            ```
            aero update
            aero upgrade
            ```
            `/home` is never overwritten.
          files: |
            ${{ steps.ver.outputs.manifest }}
          fail_on_unmatched_files: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
